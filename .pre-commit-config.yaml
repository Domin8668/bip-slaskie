repos:
  - repo: local
    hooks:
      - id: tombi-format
        name: tombi-format
        entry: uv run tombi format
        language: system
        files: \.toml$
      - id: tombi-lint
        name: tombi-lint
        entry: uv run tombi lint --error-on-warnings
        language: system
        files: \.toml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: uv run pylint src
        language: system
        pass_filenames: false
